name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/bake-action@v6
        with:
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

  validate:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Start services
        run: |
          cp .env.example .env
          docker compose up -d --wait --timeout 120

      - name: Verify TYPO3 responds
        run: |
          sleep 10
          curl -sSf http://localhost | grep -qi "typo3"

      - name: Cleanup
        if: always()
        run: docker compose down -v
