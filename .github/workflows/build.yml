name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7 # v7.0.0
        env:
          GIT_SHA: ${{ github.sha }}
        with:
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

  validate:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Start services
        run: |
          cp .env.example .env
          docker compose pull
          docker compose up -d --wait --timeout 300 || {
            echo "=== DB logs ==="
            docker compose logs db
            echo "=== Web logs ==="
            docker compose logs web
            echo "=== TYPO3 error log ==="
            docker compose exec -T web sh -c "cat var/log/typo3_*.log 2>/dev/null | tail -50" || true
            echo "=== HTTP response ==="
            docker compose exec -T web sh -c "curl -sL http://127.0.0.1/ 2>&1 | head -50" || true
            echo "=== Container status ==="
            docker compose ps -a
            exit 1
          }

      - name: Verify TYPO3 responds
        run: |
          for i in $(seq 1 30); do
            if curl -sSfkL https://localhost 2>/dev/null | grep -qi "typo3"; then
              echo "TYPO3 is responding."
              exit 0
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 5
          done
          echo "ERROR: TYPO3 did not respond in time."
          docker compose logs web
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v
