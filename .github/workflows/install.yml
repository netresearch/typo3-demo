name: Deploy (Fresh Install)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm full data reset"
        required: true

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.inputs.confirm == 'yes'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.HETZNER_SSH_HOST }}
          username: ${{ secrets.HETZNER_SSH_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: TYPO3_DOMAIN,MARIADB_ROOT_PASSWORD,MARIADB_PASSWORD,TYPO3_ENCRYPTION_KEY
          script: |
            cd /opt/typo3-demo
            git pull --ff-only
            git lfs pull
            printf '%s\n' \
              "COMPOSE_PROJECT_NAME=typo3-demo" \
              "TYPO3_DOMAIN=${TYPO3_DOMAIN}" \
              "MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}" \
              "MARIADB_DATABASE=typo3" \
              "MARIADB_USER=typo3" \
              "MARIADB_PASSWORD=${MARIADB_PASSWORD}" \
              "TYPO3_ENCRYPTION_KEY=${TYPO3_ENCRYPTION_KEY}" \
              "TYPO3_CONTEXT=Production" \
              > .env
            make reset
            make up
        env:
          TYPO3_DOMAIN: ${{ secrets.TYPO3_DOMAIN }}
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
          MARIADB_PASSWORD: ${{ secrets.MARIADB_PASSWORD }}
          TYPO3_ENCRYPTION_KEY: ${{ secrets.TYPO3_ENCRYPTION_KEY }}
