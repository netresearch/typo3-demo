worker_processes auto;
pcre_jit on;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # No compression here — Caddy (edge proxy) handles zstd/brotli/gzip for clients
    upstream php-fpm {
        server 127.0.0.1:9000;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        root /var/www/public;
        index index.php index.html;
        client_max_body_size 50m;

        # Security headers (defense-in-depth, Caddy also sets these)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location / {
            try_files $uri $uri/ /index.php$is_args$args;
        }

        location ~ \.php$ {
            fastcgi_pass php-fpm;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_buffer_size 32k;
            fastcgi_buffers 16 16k;
            fastcgi_busy_buffers_size 64k;
            fastcgi_read_timeout 120;
            fastcgi_keep_conn on;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
            try_files $uri =404;
        }

        # Block access to sensitive paths
        location ~ ^/(vendor|var|config|packages)/ { deny all; }
        location ~ \.(sql|sql\.gz|bak|orig|swp)$ { deny all; }
        location ~ /\. { deny all; }
    }
}
