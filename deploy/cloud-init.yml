#cloud-config
package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose-plugin
  - git
  - git-lfs
  - ufw
  - fail2ban
  - make

runcmd:
  - systemctl enable docker
  - systemctl start docker
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 443/udp
  - ufw --force enable
  - git lfs install --system
  - useradd -m -s /bin/bash -G docker deploy
  - mkdir -p /opt/typo3-demo
  - chown deploy:deploy /opt/typo3-demo
