name: typo3-demo

services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      MARIADB_HOST: db
      MARIADB_DATABASE: ${MARIADB_DATABASE:-typo3}
      MARIADB_USER: ${MARIADB_USER:-typo3}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-typo3}
      TYPO3_CONTEXT: ${TYPO3_CONTEXT:-Development/Docker}
      TYPO3_SETUP_ADMIN_USERNAME: ${TYPO3_SETUP_ADMIN_USERNAME:-admin}
      TYPO3_SETUP_ADMIN_PASSWORD: ${TYPO3_SETUP_ADMIN_PASSWORD:-changeme!2026}
    volumes:
      - typo3-fileadmin:/var/www/public/fileadmin
      - typo3-var:/var/www/var
      - typo3-config:/var/www/config/system
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-typo3}
      MARIADB_USER: ${MARIADB_USER:-typo3}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-typo3}
    volumes:
      - typo3-db:/var/lib/mysql
      - ./data/db.sql.gz:/docker-entrypoint-initdb.d/db.sql.gz:ro
      - ./docker/db/initdb.d/import.sh:/docker-entrypoint-initdb.d/01-import.sh:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      TYPO3_DOMAIN: ${TYPO3_DOMAIN:-localhost}
    depends_on:
      - web
    restart: unless-stopped

volumes:
  typo3-db:
  typo3-fileadmin:
  typo3-var:
  typo3-config:
  caddy-data:
  caddy-config:
