name: typo3-demo

services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      MARIADB_HOST: db
      MARIADB_DATABASE: ${MARIADB_DATABASE:-typo3}
      MARIADB_USER: ${MARIADB_USER:-typo3}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-typo3}
      TYPO3_CONTEXT: ${TYPO3_CONTEXT:-Development/Docker}
      TYPO3_DOMAIN: ${TYPO3_DOMAIN:-localhost}
    volumes:
      - typo3-fileadmin:/var/www/public/fileadmin
      - typo3-var:/var/www/var
      - typo3-config:/var/www/config/system
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-typo3}
      MARIADB_USER: ${MARIADB_USER:-typo3}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-typo3}
    volumes:
      - typo3-db:/var/lib/mysql
      - ./data/db.sql.gz:/docker-entrypoint-initdb.d/db.sql.gz:ro
      - ./docker/db/initdb.d/import.sh:/docker-entrypoint-initdb.d/01-import.sh:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M

  valkey:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M

  caddy:
    build:
      context: docker/caddy
      dockerfile: Dockerfile
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      TYPO3_DOMAIN: ${TYPO3_DOMAIN:-localhost}
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  typo3-db:
  typo3-fileadmin:
  typo3-var:
  typo3-config:
  caddy-data:
  caddy-config:
