# Logo
page.logo.file: fileadmin/user_upload/images/netresearch-typo3-demo.png
page.logo.fileInverted: fileadmin/user_upload/images/netresearch-typo3-demo-white.png
page.logo.height: 52
page.logo.width: 180

# Navigation: fixed header with transparent→white scroll transition (like v11)
# 'top' = sticky/fixed position, 'default-transition' = transparent over hero, white on scroll
page.theme.navigation.type: top
page.theme.navigation.style: 'default-transition'

# Breadcrumb: show on subpages at depth >= 2 (matches v11 behavior).
# Default enableLevel=2 means breadcrumbs appear on pages two or more levels deep.
page.theme.breadcrumb.enable: true

# Footer navigation (disable sitemap-style navigation)
page.theme.footernavigation.enable: false

# Footer meta: disable site name, language selector, copyright (old site only had social icons)
page.theme.meta.enable: false
page.theme.language.enable: false
page.theme.copyright.enable: false

# Social media
page.theme.socialmedia.channels.facebook.label: Facebook
page.theme.socialmedia.channels.facebook.url: https://www.facebook.com/netresearch
page.theme.socialmedia.channels.x.label: Twitter
page.theme.socialmedia.channels.x.url: https://twitter.com/netresearch
page.theme.socialmedia.channels.github.label: GitHub
page.theme.socialmedia.channels.github.url: https://netresearch.github.io/
page.theme.socialmedia.channels.youtube.label: YouTube
page.theme.socialmedia.channels.youtube.url: https://www.youtube.com/user/NetresearchGMBH

# SCSS color overrides to match original v11 Netresearch theme
# Old site: --bs-primary=#585961, --bs-secondary=#2f99a4 (teal)
# Buttons use btn-secondary, so secondary must be teal
plugin.bootstrap_package.settings.scss.primary: '#585961'
plugin.bootstrap_package.settings.scss.secondary: '#2f99a4'
plugin.bootstrap_package.settings.scss.tertiary: '#8bc0c6'
plugin.bootstrap_package.settings.scss.quaternary: '#1d6069'
plugin.bootstrap_package.settings.scss.link-color: '#2f99a4'
plugin.bootstrap_package.settings.scss.link-shade-percentage: '0%'

# BS5 link underlines: BS4 had none, BS5 added by default.
# Use SCSS variables instead of CSS !important overrides.
plugin.bootstrap_package.settings.scss.link-decoration: 'none'
plugin.bootstrap_package.settings.scss.link-hover-decoration: 'underline'

# BS5 WCAG contrast ratio: BS5 defaults to 4.5 which makes color-contrast(#2f99a4)
# return black (bad for btn-secondary text and frame-background-secondary headings).
# BS4 had no contrast function — lowering to 3 restores v11 visual behavior.
plugin.bootstrap_package.settings.scss.min-contrast-ratio: '3'

# BS5 navbar link color: BS Package v16 defaults to rgba(0,0,0,.65) which is
# lighter than v11. Override to match the v11 opacity (.55).
plugin.bootstrap_package.settings.scss.navbar-light-color: 'rgba(0,0,0,.55)'

# Footer backgrounds: match v11 (content=#cccdcc, meta=white)
plugin.bootstrap_package.settings.scss.dark: '#cccdcc'
plugin.bootstrap_package.settings.scss.darker: '#ffffff'
