name: netresearch/login-showcase
title: Login Showcase
description: 2x2 grid login page with passkey explanation, demo credentials, and contextual info panel.
group: common
prefixFields: true
fields:
  - identifier: demo_username
    type: Text
    default: 'demo'
  - identifier: demo_password
    type: Text
    default: 'demo'
  - identifier: info_heading
    type: Text
    default: 'What are Passkeys?'
  - identifier: info_text
    type: Textarea
    default: 'Passkeys replace passwords with biometric authentication — fingerprint, face recognition, or security keys. Phishing-resistant, faster, and more secure than passwords.'
